name: Vinted Snipe Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: vinted-bot-loop
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Firefox installieren
        run: sudo apt-get update && sudo apt-get install -y firefox

      - name: Geckodriver installieren
        run: |
          GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep tag_name | cut -d '"' -f4)
          wget -q https://github.com/mozilla/geckodriver/releases/download/${GECKO_VERSION}/geckodriver-${GECKO_VERSION}-linux64.tar.gz
          tar -xzf geckodriver-${GECKO_VERSION}-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/geckodriver

      - name: Python Pakete installieren
        run: pip install selenium requests

      - name: Bot ausfuehren
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot_github.py

      - name: Aenderungen speichern
        run: |
          git config user.name "Vinted Bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_ids.json
          git diff --quiet --cached || git commit -m "Update seen_ids"
          git push
